<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kcyeap的匿名回饋</title>

    
    <style>
        /* 基礎質感與重設 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #121214; /* 質感深鐵灰 */
            color: #e2e8f0; /* 柔和白 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        /* 主卡片設計 */
        .container {
            width: 100%;
            max-width: 390px; /* 手機黃金閱讀寬度 */
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 45px 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        /* 幾何頭像 */
        .profile-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 0 auto 24px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            color: #ffffff;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #94a3b8; /* 內斂灰 */
            margin-bottom: 35px;
        }

        /* 極簡內嵌匿名提問箱區塊 */
        .ask-box-title {
            font-size: 0.95rem;
            color: #ffffff;
            font-weight: 500;
            margin-bottom: 16px;
            text-align: left;
            padding-left: 4px;
            letter-spacing: 0.5px;
        }

        .ask-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .ask-input {
            width: 100%;
            min-height: 120px; /* 加高輸入框，寫長文更好看 */
            padding: 16px;
            background-color: rgba(0, 0, 0, 0.2); /* 深色層次感 */
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            color: #ffffff;
            font-size: 0.95rem;
            line-height: 1.5;
            resize: none; /* 禁用拉伸避免排版壞掉 */
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .ask-input:focus {
            border-color: rgba(255, 255, 255, 0.2); /* 聚焦時微亮 */
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .ask-input::placeholder {
            color: #475569; /* 暗色提示字 */
        }

        /* 送出按鈕：白底黑字焦點設計 */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #ffffff;
            color: #121214;
            border: none;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .submit-btn:hover, .submit-btn:active {
            background-color: #e2e8f0;
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: scale(0.98); /* 點擊時的扎實物理按壓感 */
        }

        /* 頁尾低調細字 */
        .footer {
            margin-top: 50px;
            font-size: 0.7rem;
            color: #475569;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-avatar">
            <img src="260302.jpg" alt="kcyeap Avatar">
        </div>
        
        <h1>kcyeap</h1>
        <div class="subtitle">匿名回饋、職場建議、匿名告解、宣洩不滿、意見箱</div>

        <div class="ask-box-title">偷偷告訴我</div>
        
        <form class="ask-form" action="https://formspree.io/f/maqkoaon" method="POST">
            <input type="text" name="_gotcha" style="display:none">
            
            <textarea class="ask-input" name="message" placeholder="輸入你想偷偷對我說的話..." required></textarea>
            <button class="submit-btn" type="submit">悄悄發送</button>
        </form>

        <div class="footer">© 2026 kcyeap. ALL RIGHTS RESERVED.</div>
    </div>

</body>
</html>
